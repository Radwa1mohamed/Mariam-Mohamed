<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيمين | خدمات كتابة المحتوى الإبداعي والتسويق الرقمي الفاخر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --navy-dark: #0A192F;
            --navy-light: #172A45;
            --pink-soft: #F06292;
            --pink-hover: #D81B60;
            --white-pure: #FFFFFF;
            --off-white: #EAE8DC;
            --slate-gray: #5A6E7F;
            --bg-outer: #112A46;
            --font-arabic: 'Tajawal', 'Cairo', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body { font-family: var(--font-arabic); background-color: var(--bg-outer); color: var(--navy-dark); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 50px 0; }

        .main-wrapper { width: 95%; max-width: 1280px; background-color: var(--off-white); border-radius: 60px 60px 320px 60px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4); position: relative; overflow: hidden; display: flex; flex-direction: column; }

        /* --- Navbar Styles --- */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 30px 70px; background-color: #fcfbf7; border-bottom: 1px solid rgba(0, 0, 0, 0.05); position: relative; z-index: 100; }
        .logo { font-family: var(--font-serif); font-size: 32px; font-weight: 700; color: var(--navy-dark); display: flex; align-items: center; gap: 10px; }
        .logo .sparkle { color: var(--pink-soft); animation: pulse 2s infinite; }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--navy-dark); font-weight: 700; transition: color 0.3s; }
        .nav-links a:hover { color: var(--pink-soft); }
        .menu-toggle { display: none; font-size: 24px; cursor: pointer; }
        
        .btn-consultation { display: flex; align-items: center; gap: 8px; background-color: var(--pink-soft); color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; transition: 0.3s; font-weight: bold; }
        .btn-consultation:hover { background-color: var(--pink-hover); }
        .btn-consultation .icon { display: none; }

        @media (max-width: 992px) {
            .btn-consultation .text { display: none; }
            .btn-consultation .icon { display: block; }
            .btn-consultation { padding: 10px; border-radius: 50%; }
        }

        @media (max-width: 768px) {
            .navbar { padding: 20px; }
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; right: 0; width: 100%; background: var(--white-pure); padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
            .nav-links.active { display: flex; }
            .nav-links li { margin: 15px 0; }
        }

        /* --- بقية التنسيقات ثابتة كما هي --- */
        .hero { display: grid; grid-template-columns: 1.1fr 0.9fr; align-items: center; gap: 60px; padding: 40px 80px 100px 80px; }
        .title { font-size: 56px; font-weight: 800; margin-bottom: 25px; }
        .btn-pink { background-color: var(--pink-soft); color: var(--white-pure); padding: 16px 42px; border-radius: 50px; text-decoration: none; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <header class="navbar">
            <div class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">
                <i class="fa-solid fa-bars"></i>
            </div>

            <div class="logo">
                <span class="sparkle">✦</span> مريم محمد
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="#">الرئيسية</a></li>
                    <li><a href="#about">قصتنا</a></li>
                    <li><a href="#services">خدماتنا</a></li>
                    <li><a href="#portfolio">الاعمال السابقة</a></li>
                    <li><a href="#contact">تواصل معنا</a></li>
                </ul>
            </nav>

            <a href="#" class="btn-consultation">
                <span class="text">حجز استشارة</span>
                <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </a>
        </header>

        <main class="hero">
            <div class="hero-content">
                <h1 class="title">أهلاً بك في عالم<br>تتحول فيه الكلمات<br>إلى أرباح وتأثير</h1>
                <p class="subtitle">وجهتك الأولى لصناعة الحضور الرقمي الفاخر. هنا ندمج إبداع كتابة المحتوى بذكاء الإستراتيجيات التسويقية.</p>
                <div class="actions">
                    <a href="#contact" class="btn-pink">ابدئي الآن</a>
                </div>
            </div>
            <div class="hero-visual">
                <div class="image-frame">
                    <img src="https://images.unsplash.com/photo-1594744803329-e58b31de8bf5?q=80&w=1000&auto=format&fit=crop" alt="Model">
                </div>
            </div>
        </main>
    </div>

</body>
</html>
