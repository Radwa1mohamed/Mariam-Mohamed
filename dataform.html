<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>احجز استشارتك المجانية | مريم محمد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* سيطرة كاملة للون الأوف وايت الفخم مع تباين ألوان البراند */
            --bg-offwhite: #FAF8F5;     /* لون الأوف وايت الأساسي للخلفية */
            --navy-dark: #0F3345;       /* الكحلي الداكن للنصوص والعناصر القيادية */
            --pink-accent: #E056A0;     /* الوردي الزاهي للتركيز والأزرار */
            --pink-soft: #F5EBF3;       /* الوردي الناعم اللطيف */
            --bg-card: #ffffff;         /* الأبيض النقي للصندوق لجعل الأوف وايت يبرز بوضوح */
            
            --color-text-dark: #0F3345;
            --color-text-muted: #53707e;
            --card-shadow: 0 15px 40px rgba(15, 51, 69, 0.06);
            --border-radius: 20px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
background-color: var(  --navy-dark);
            color: var(--color-text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            line-height: 1.8;
        }

        /* حاوية الحجز المحدثة بشكل احترافي */
        .booking-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg-card);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: 45px 35px;
            border-top: 5px solid var(--pink-accent); 
            position: relative;
            transition: var(--transition-smooth);
        }

        /* تنسيق الهيدر العلوي الاحترافي الجديد تماماً ليكون مضبوطاً ومتناسقاً */
        .booking-header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* شريط الأيقونات العلوي لعرض أنواع الاستشارات بشكل منسق جداً */
        .header-badges-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background-color: var(--bg-offwhite);
            border: 1px solid #e2e8f0;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: var(--navy-dark);
        }

        .header-badge svg {
            color: var(--pink-accent);
        }

        .booking-header h2 {
            color: var(--navy-dark);
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .booking-header p {
            color: var(--color-text-muted);
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--navy-dark);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0; 
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            color: var(--navy-dark);
            background-color: #f8fafc;
            box-sizing: border-box;
            transition: var(--transition-smooth);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--pink-accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(224, 86, 160, 0.15);
        }

        ::placeholder {
            color: #a0aec0;
            font-size: 13px;
        }

        /* زر الإرسال الاحترافي الفخم باللون الوردي المعتمد */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--pink-accent); 
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;   
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(224, 86, 160, 0.3);
            transition: var(--transition-smooth);
        }

        .submit-btn:hover {
            background-color: #c44387; 
            box-shadow: 0 6px 20px rgba(224, 86, 160, 0.4);
            transform: translateY(-2px);
        }

        .success-message {
            display: none; 
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease forwards;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: rgba(224, 86, 160, 0.1);
            color: var(--pink-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .success-message h3 {
            color: var(--navy-dark);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .success-message p {
            color: var(--color-text-muted);
            font-size: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .booking-container {
                margin: 15px auto;
                padding: 30px 20px;
            }
            .header-badges-row {
                gap: 8px;
            }
            .header-badge {
                padding: 5px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<section id="booking-section" class="booking-container">
    
    <div id="form-content">
        <div class="booking-header">
            <div class="header-badges-row">
                <div class="header-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>جلسة فردية 1:1</span>
                </div>
                <div class="header-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <span>استشارة براند</span>
                </div>
                <div class="header-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                    <span>استشارة شخصية</span>
                </div>
            </div>

            <h2>احجزي جلستكِ الإستشارية المجانية</h2>
            <p>املأي البيانات التالية وسنقوم بالتواصل معكِ لتأكيد موعد استشارتكِ</p>
        </div>

        <form id="booking-form" action="https://formsubmit.co/radwa134004@gmail.com" method="POST" class="booking-form">
            <input type="hidden" name="_next" value="">
            <input type="hidden" name="_captcha" value="false">

            <div class="form-group">
                <label for="name">الاسم بالكامل</label>
                <input type="text" name="الاسم" id="name" required placeholder="أدخلي اسمكِ الكريم">
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" name="الإيميل" id="email" required placeholder="example@mail.com">
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف (واتساب)</label>
                <input type="tel" name="رقم الهاتف" id="phone" required placeholder="01xxxxxxxxx">
            </div>

            <!-- تم الحفاظ على اختياراتكِ الأصلية تماماً بناءً على طلبكِ -->
          <div class="form-group">
                <label for="session-type">نوع الجلسة / الاستشارة</label>
                <select name="نوع الجلسة" id="session-type" required>
                    <option value="" disabled selected>اختر نوع الاستشارة</option>
                    <option value="استشارة أعمال">استشارة تسويق وبناء خطة محتوى</option>
                    <option value="تطوير صفحات هبوط">تطوير وكتابة صفحات هبوط (Landing Pages)</option>
                    <option value="سكريبتات إعلانية">كتابة سكريبتات إعلانية (Reels / يوتيوب)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="date">التاريخ المفضل</label>
                    <input type="date" name="التاريخ" id="date" required>
                </div>
                <div class="form-group">
                    <label for="time">الوقت المفضل</label>
                    <input type="time" name="الوقت" id="time" required>
                </div>
            </div>

            <div class="form-group">
                <label for="notes">أخبرينا بنبذة عن مشروعكِ الحالي (اختياري)</label>
                <textarea name="ملاحظات إضافية" id="notes" rows="4" placeholder="اكتبي هنا أي تفاصيل تودين إطلاع مريم عليها قبل الجلسة لضمان تحقيق أقصى استفادة..."></textarea>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">تأكيد حجز الاستشارة المجانية</button>
        </form>
    </div>

    <div id="success-box" class="success-message">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h3>تم طلب الاستشارة بنجاح!</h3>
        <p>شكراً لكِ، سنتواصل معكِ عبر الواتساب في أقرب وقت لتأكيد الموعد النهائي للاستشارة الفردية.</p>
    </div>

</section>

<script>
    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        const form = this;
        const submitBtn = document.getElementById('submit-btn');
        const formContent = document.getElementById('form-content');
        const successBox = document.getElementById('success-box');
        
        submitBtn.textContent = 'جاري إرسال طلبكِ...';
        submitBtn.disabled = true;
        
        fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(response => {
            if (response.ok) {
                formContent.style.display = 'none';
                successBox.style.display = 'block';
            } else {
                alert('عذراً، حدث خطأ ما. يرجى المحاولة مرة أخرى.');
                submitBtn.textContent = 'تأكيد حجز الاستشارة المجانية';
                submitBtn.disabled = false;
            }
        })
        .catch(error => {
            alert('عذراً، يرجى التحقق من اتصالك بالإنترنت.');
            submitBtn.textContent = 'تأكيد حجز الاستشارة المجانية';
            submitBtn.disabled = false;
        });
    });
</script>
    
</body>
</html>
